# ===== Lingora backend =====
server.port=8080

# Anthropic Claude (tóm tắt). Để trống ANTHROPIC_API_KEY -> dùng extractive fallback.
# KHÔNG hardcode key ở đây — đặt qua biến môi trường.
lingora.anthropic.api-key=${ANTHROPIC_API_KEY:}
lingora.anthropic.model=${LINGORA_MODEL:claude-sonnet-4-6}
lingora.anthropic.max-tokens=1500

# CORS: origin được phép gọi API (trang Pages + chạy local).
lingora.cors.allowed-origins=https://hhieuann.github.io,http://localhost:5500,http://127.0.0.1:5500

# Lưu buổi học: H2 file-based (giữ dữ liệu giữa các lần chạy), không cần cài DB ngoài.
spring.datasource.url=jdbc:h2:file:./data/lingora
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
